<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chore Chart">
<title>My Chore Chart ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFD93D;
    --sky: #6EC6FF;
    --grass: #4ECB71;
    --berry: #FF6B8A;
    --grape: #B06CFF;
    --orange: #FF9F43;
    --coral: #FF6F61;
    --mint: #00D2A0;
    --bg: #FFF8E7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-text-size-adjust: 100%;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.12;
  }
  body::before {
    width: 400px; height: 400px;
    background: var(--sky);
    top: -100px; right: -100px;
  }
  body::after {
    width: 300px; height: 300px;
    background: var(--berry);
    bottom: -80px; left: -80px;
  }

  .bg-star {
    position: fixed;
    font-size: 28px;
    opacity: 0.15;
    z-index: 0;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.08; transform: scale(0.9); }
    100% { opacity: 0.2; transform: scale(1.1); }
  }

  .container {
    max-width: 650px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  .header-icon {
    font-size: 56px;
    display: block;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .header h1 {
    font-family: 'Bubblegum Sans', cursive, -apple-system, sans-serif;
    font-size: 42px;
    color: var(--grape);
    text-shadow: 3px 3px 0 rgba(176,108,255,0.2);
    margin: 8px 0 4px;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 16px;
    font-weight: 700;
    color: #999;
    letter-spacing: 0.5px;
  }

  .reward-banner {
    background: linear-gradient(135deg, var(--sun), var(--orange));
    border-radius: 20px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
    box-shadow: 0 6px 0 rgba(255,159,67,0.35);
    position: relative;
    overflow: hidden;
  }
  .reward-banner::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 12px,
      rgba(255,255,255,0.08) 12px, rgba(255,255,255,0.08) 24px
    );
    pointer-events: none;
  }
  .reward-banner .ipad-icon { font-size: 36px; z-index: 1; }
  .reward-banner .reward-text {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 20px;
    color: #fff;
    z-index: 1;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }
  .reward-banner .reward-total {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 30px;
    color: #fff;
    z-index: 1;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    min-width: 90px;
    text-align: center;
  }

  /* TIMER */
  .timer-section {
    background: #fff;
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 28px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border: 3px solid var(--grape);
    position: relative;
    overflow: hidden;
  }
  .timer-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--berry), var(--grape), var(--sky), var(--grass), var(--sun));
    pointer-events: none;
  }
  .timer-label {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 22px;
    color: var(--grape);
    margin-bottom: 12px;
  }
  .timer-display {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 72px;
    color: #333;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 8px;
    transition: color 0.3s;
  }
  .timer-display.warning { color: var(--orange); }
  .timer-display.critical {
    color: var(--coral);
    animation: pulse-critical 1s ease-in-out infinite;
  }
  @keyframes pulse-critical {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .timer-display.done-flash {
    color: var(--berry);
    animation: flash-done 0.5s ease-in-out infinite;
  }
  @keyframes flash-done {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .timer-subtitle {
    font-size: 14px;
    font-weight: 700;
    color: #bbb;
    margin-bottom: 16px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 14px;
    background: #f0f0f0;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--grass), var(--sky));
    transition: width 1s linear;
  }
  .progress-bar-fill.warning {
    background: linear-gradient(90deg, var(--orange), var(--sun));
  }
  .progress-bar-fill.critical {
    background: linear-gradient(90deg, var(--coral), var(--berry));
  }

  .timer-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .timer-btn {
    border: none;
    border-radius: 14px;
    padding: 12px 28px;
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.15s;
    color: #fff;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .timer-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-start {
    background: var(--grass);
    box-shadow: 0 4px 0 rgba(78,203,113,0.4);
  }
  .btn-pause {
    background: var(--orange);
    box-shadow: 0 4px 0 rgba(255,159,67,0.4);
  }
  .btn-stop {
    background: var(--coral);
    box-shadow: 0 4px 0 rgba(255,111,97,0.4);
  }
  .timer-no-time {
    font-size: 16px;
    font-weight: 700;
    color: #ccc;
    padding: 8px 0;
  }

  /* CHORE CARDS */
  .chores-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .chore-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border-radius: 20px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    touch-action: manipulation;
  }
  .chore-card.locked { cursor: not-allowed; opacity: 0.7; }
  .chore-card.done { opacity: 0.55; transform: scale(0.97); }
  .chore-card.done .chore-name {
    text-decoration: line-through;
    text-decoration-thickness: 3px;
  }

  .chore-icon {
    width: 58px; height: 58px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
    pointer-events: none;
  }
  .chore-info { flex: 1; pointer-events: none; }
  .chore-name {
    font-size: 19px;
    font-weight: 800;
    color: #333;
    line-height: 1.2;
  }
  .chore-minutes {
    font-size: 14px;
    font-weight: 700;
    margin-top: 3px;
  }

  .check-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid #ddd;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    font-size: 22px;
    color: transparent;
    pointer-events: none;
  }
  .chore-card.done .check-circle {
    color: #fff;
    animation: pop 0.35s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.5); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    z-index: 100;
    pointer-events: none;
    animation: confetti-fall 1.2s ease-out forwards;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(0.3); }
  }

  .all-done {
    display: none;
    text-align: center;
    margin-top: 28px;
    animation: tada 0.6s ease;
  }
  .all-done.show { display: block; }
  @keyframes tada {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .all-done-icon { font-size: 64px; }
  .all-done h2 {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 32px;
    color: var(--grass);
    margin-top: 6px;
  }
  .all-done p {
    font-size: 16px;
    color: #888;
    font-weight: 700;
    margin-top: 4px;
  }

  .reset-btn {
    display: block;
    margin: 32px auto 0;
    background: var(--sky);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 12px 32px;
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(110,198,255,0.4);
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }

  /* BONUS CARD */
  .bonus-section { margin-top: 20px; }
  .bonus-card {
    background: linear-gradient(135deg, #FFF0F5, #FFF);
    border-radius: 20px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-left: 6px solid var(--berry);
    position: relative;
    overflow: hidden;
  }
  .bonus-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 120px;
    background: linear-gradient(90deg, transparent, rgba(255,107,138,0.04));
    pointer-events: none;
  }
  .bonus-icon {
    width: 58px; height: 58px;
    border-radius: 16px;
    background: #FFE0EA;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }
  .bonus-info { flex: 1; }
  .bonus-name {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 19px;
    color: var(--berry);
    line-height: 1.2;
  }
  .bonus-subtitle {
    font-size: 13px;
    font-weight: 700;
    color: #ccc;
    margin-top: 2px;
  }
  .bonus-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    z-index: 1;
  }
  .bonus-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    line-height: 1;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .bonus-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .bonus-btn-minus {
    background: #ddd;
    color: #999;
  }
  .bonus-btn-plus {
    background: var(--berry);
    box-shadow: 0 3px 0 rgba(255,107,138,0.35);
  }
  .bonus-count {
    font-family: 'Bubblegum Sans', cursive, sans-serif;
    font-size: 26px;
    color: var(--berry);
    min-width: 50px;
    text-align: center;
  }

  /* Per-card accent colors */
  .c0 { border-left: 6px solid var(--sky); }
  .c0 .chore-icon { background: #E8F4FD; }
  .c0 .chore-minutes { color: var(--sky); }
  .c0.done .chore-name { text-decoration-color: var(--sky); }
  .c0.done .check-circle { border-color: var(--sky); background: var(--sky); }

  .c1 { border-left: 6px solid var(--berry); }
  .c1 .chore-icon { background: #FFE8EE; }
  .c1 .chore-minutes { color: var(--berry); }
  .c1.done .chore-name { text-decoration-color: var(--berry); }
  .c1.done .check-circle { border-color: var(--berry); background: var(--berry); }

  .c2 { border-left: 6px solid var(--grass); }
  .c2 .chore-icon { background: #E4F8EA; }
  .c2 .chore-minutes { color: var(--grass); }
  .c2.done .chore-name { text-decoration-color: var(--grass); }
  .c2.done .check-circle { border-color: var(--grass); background: var(--grass); }

  .c3 { border-left: 6px solid var(--grape); }
  .c3 .chore-icon { background: #F0E4FF; }
  .c3 .chore-minutes { color: var(--grape); }
  .c3.done .chore-name { text-decoration-color: var(--grape); }
  .c3.done .check-circle { border-color: var(--grape); background: var(--grape); }

  .c4 { border-left: 6px solid var(--orange); }
  .c4 .chore-icon { background: #FFF0E0; }
  .c4 .chore-minutes { color: var(--orange); }
  .c4.done .chore-name { text-decoration-color: var(--orange); }
  .c4.done .check-circle { border-color: var(--orange); background: var(--orange); }

  .c5 { border-left: 6px solid var(--coral); }
  .c5 .chore-icon { background: #FFE8E5; }
  .c5 .chore-minutes { color: var(--coral); }
  .c5.done .chore-name { text-decoration-color: var(--coral); }
  .c5.done .check-circle { border-color: var(--coral); background: var(--coral); }

  .c6 { border-left: 6px solid var(--mint); }
  .c6 .chore-icon { background: #DFFAF2; }
  .c6 .chore-minutes { color: var(--mint); }
  .c6.done .chore-name { text-decoration-color: var(--mint); }
  .c6.done .check-circle { border-color: var(--mint); background: var(--mint); }
</style>
</head>
<body>

<span class="bg-star" style="top:12%;left:8%;animation-delay:0s;">⭐</span>
<span class="bg-star" style="top:25%;right:12%;animation-delay:0.8s;">🌟</span>
<span class="bg-star" style="top:55%;left:5%;animation-delay:1.5s;">✨</span>
<span class="bg-star" style="top:70%;right:8%;animation-delay:0.4s;">⭐</span>
<span class="bg-star" style="top:88%;left:15%;animation-delay:1.1s;">🌟</span>

<div class="container">
  <div class="header">
    <span class="header-icon">🏆</span>
    <h1>My Chore Chart</h1>
    <p>Tap a chore when you're done!</p>
  </div>

  <div class="reward-banner">
    <span class="ipad-icon">📱</span>
    <span class="reward-text">iPad Time Earned:</span>
    <span class="reward-total" id="totalMinutes">0 min</span>
  </div>

  <div class="timer-section" id="timerSection">
    <div class="timer-label">⏱️ iPad Timer</div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-subtitle" id="timerSubtitle">Complete chores to earn time!</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width: 100%;"></div>
    </div>
    <div class="timer-buttons" id="timerButtons">
      <button class="timer-btn btn-start" id="btnStart" disabled>▶️ Start</button>
      <button class="timer-btn btn-pause" id="btnPause" disabled>⏸️ Pause</button>
      <button class="timer-btn btn-stop" id="btnStop" disabled>⏹️ Done</button>
    </div>
    <div class="timer-no-time" id="noTimeMsg">Do your chores first! 💪</div>
  </div>

  <div class="chores-list" id="choresList"></div>

  <div class="bonus-section">
    <div class="bonus-card">
      <div class="bonus-icon">💖</div>
      <div class="bonus-info">
        <div class="bonus-name">Mommy Kind Minutes</div>
        <div class="bonus-subtitle">Bonus for being extra kind!</div>
      </div>
      <div class="bonus-controls">
        <button class="bonus-btn bonus-btn-minus" id="bonusMinus" disabled>−</button>
        <div class="bonus-count" id="bonusCount">0</div>
        <button class="bonus-btn bonus-btn-plus" id="bonusPlus">+</button>
      </div>
    </div>
  </div>

  <div class="all-done" id="allDone">
    <span class="all-done-icon">🎉</span>
    <h2>Amazing Job!</h2>
    <p>You finished all your chores!</p>
  </div>

  <button class="reset-btn" id="btnReset">🔄 Start Over</button>
</div>

<script>
  // ── TOUCH HELPER ──
  // Use touchend on iOS to avoid 300ms delay and unresponsive clicks
  function onTap(el, fn) {
    if (!el) return;
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      fn(e);
    }, {passive: false});
    el.addEventListener('click', function(e) {
      fn(e);
    });
  }

  // ── AUDIO ──
  var audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playBeep(count) {
    initAudio();
    var i = 0;
    function beepOnce() {
      if (i >= count) return;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.value = (i % 2 === 0) ? 880 : 1100;
      gain.gain.value = 0.15;
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.18);
      i++;
      setTimeout(beepOnce, 300);
    }
    beepOnce();
  }

  function playDoneSound() {
    initAudio();
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(freq, idx) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0.12;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15 * (idx + 1) + 0.3);
      osc.start(audioCtx.currentTime + 0.15 * idx);
      osc.stop(audioCtx.currentTime + 0.15 * idx + 0.35);
    });
  }

  // ── DATA ──
  var chores = [
    { name: "Make My Bed",            icon: "🛏️",  minutes: 5  },
    { name: "Brush My Teeth",         icon: "🪥",  minutes: 5  },
    { name: "Pick Up Toys",           icon: "🧸",  minutes: 10 },
    { name: "Clothes in Hamper",      icon: "👕",  minutes: 5  },
    { name: "Feed the Kitties",       icon: "🐱",  minutes: 5  },
    { name: "Dishes in the Sink",     icon: "🍽️",  minutes: 5  },
    { name: "Get Dressed by Myself",  icon: "👖",  minutes: 10 },
  ];

  var list = document.getElementById('choresList');
  var totalEl = document.getElementById('totalMinutes');
  var allDoneEl = document.getElementById('allDone');
  var timerDisplay = document.getElementById('timerDisplay');
  var timerSubtitle = document.getElementById('timerSubtitle');
  var progressBar = document.getElementById('progressBar');
  var btnStart = document.getElementById('btnStart');
  var btnPause = document.getElementById('btnPause');
  var btnStop = document.getElementById('btnStop');
  var noTimeMsg = document.getElementById('noTimeMsg');

  var choreState = chores.map(function() { return false; });

  var timerInterval = null;
  var timerSecondsLeft = 0;
  var timerTotalSeconds = 0;
  var timerRunning = false;
  var timerUsed = false;
  var bonusMinutes = 0;

  // ── WIRE UP BUTTONS WITH TOUCH SUPPORT ──
  onTap(btnStart, function() { startTimer(); });
  onTap(btnPause, function() { pauseTimer(); });
  onTap(btnStop, function() { stopTimer(); });
  onTap(document.getElementById('btnReset'), function() { resetAll(); });
  onTap(document.getElementById('bonusPlus'), function() { adjustBonus(5); });
  onTap(document.getElementById('bonusMinus'), function() { adjustBonus(-5); });

  function adjustBonus(amount) {
    if (timerRunning) return;
    bonusMinutes = Math.max(0, bonusMinutes + amount);
    document.getElementById('bonusCount').textContent = bonusMinutes > 0 ? '+' + bonusMinutes : '0';
    document.getElementById('bonusMinus').disabled = bonusMinutes <= 0;
    timerUsed = false;
    updateTotal();
  }

  function getEarnedMinutes() {
    var total = 0;
    choreState.forEach(function(done, i) { if (done) total += chores[i].minutes; });
    return total + bonusMinutes;
  }

  function formatTime(totalSecs) {
    var m = Math.floor(totalSecs / 60);
    var s = totalSecs % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function updateTimerUI() {
    var earned = getEarnedMinutes();
    var hasTime = earned > 0;

    if (!timerRunning && !timerUsed) {
      timerSecondsLeft = earned * 60;
      timerTotalSeconds = earned * 60;
      timerDisplay.textContent = formatTime(timerSecondsLeft);
      timerDisplay.className = 'timer-display';
      progressBar.style.width = '100%';
      progressBar.className = 'progress-bar-fill';

      if (hasTime) {
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStop.disabled = true;
        noTimeMsg.style.display = 'none';
        timerSubtitle.textContent = earned + ' minutes of iPad time ready!';
      } else {
        btnStart.disabled = true;
        btnPause.disabled = true;
        btnStop.disabled = true;
        noTimeMsg.style.display = 'block';
        timerSubtitle.textContent = 'Complete chores to earn time!';
      }
    }

    if (timerUsed && !timerRunning) {
      timerDisplay.textContent = '00:00';
      timerDisplay.className = 'timer-display';
      btnStart.disabled = true;
      btnPause.disabled = true;
      btnStop.disabled = true;
      progressBar.style.width = '0%';
      timerSubtitle.textContent = 'iPad time is all used up! 🎉';
      noTimeMsg.style.display = 'none';
    }
  }

  function startTimer() {
    initAudio();
    if (timerRunning) return;
    if (timerSecondsLeft <= 0) return;

    timerRunning = true;
    timerTotalSeconds = timerTotalSeconds || timerSecondsLeft;
    btnStart.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled = false;
    noTimeMsg.style.display = 'none';
    timerSubtitle.textContent = 'iPad time is running! ⏱️';

    render();
    document.getElementById('bonusPlus').disabled = true;
    document.getElementById('bonusMinus').disabled = true;

    timerInterval = setInterval(function() {
      timerSecondsLeft--;
      timerDisplay.textContent = formatTime(timerSecondsLeft);

      var pct = (timerSecondsLeft / timerTotalSeconds) * 100;
      progressBar.style.width = pct + '%';

      var minutesLeft = timerSecondsLeft / 60;
      if (minutesLeft <= 1 && timerSecondsLeft > 0) {
        timerDisplay.className = 'timer-display critical';
        progressBar.className = 'progress-bar-fill critical';
        timerSubtitle.textContent = 'Almost done! ⚡';
      } else if (minutesLeft <= 3) {
        timerDisplay.className = 'timer-display warning';
        progressBar.className = 'progress-bar-fill warning';
        timerSubtitle.textContent = 'Wrapping up soon! ⏱️';
      }

      if (timerSecondsLeft === 10) {
        playBeep(3);
      }

      if (timerSecondsLeft <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        timerUsed = true;
        timerDisplay.textContent = "⏰ TIME'S UP!";
        timerDisplay.className = 'timer-display done-flash';
        timerSubtitle.textContent = 'Great job using your time!';
        progressBar.style.width = '0%';
        btnStart.disabled = true;
        btnPause.disabled = true;
        btnStop.disabled = true;
        playDoneSound();
        bigConfetti();
        render();

        setTimeout(function() {
          timerDisplay.className = 'timer-display';
          timerDisplay.textContent = '00:00';
          timerSubtitle.textContent = 'iPad time is all used up! 🎉';
        }, 4000);
      }
    }, 1000);
  }

  function pauseTimer() {
    if (!timerRunning) return;
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    btnStart.disabled = false;
    btnPause.disabled = true;
    timerSubtitle.textContent = 'Timer paused ⏸️';
    document.getElementById('bonusPlus').disabled = false;
    document.getElementById('bonusMinus').disabled = bonusMinutes <= 0;
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    timerUsed = true;
    timerSecondsLeft = 0;
    render();
    updateTimerUI();
  }

  // ── RENDERING ──
  function render() {
    list.innerHTML = '';
    chores.forEach(function(chore, i) {
      var card = document.createElement('div');
      var classes = 'chore-card c' + i;
      if (choreState[i]) classes += ' done';
      if (timerRunning) classes += ' locked';
      card.className = classes;
      card.innerHTML =
        '<div class="chore-icon">' + chore.icon + '</div>' +
        '<div class="chore-info">' +
          '<div class="chore-name">' + chore.name + '</div>' +
          '<div class="chore-minutes">📱 +' + chore.minutes + ' min iPad time</div>' +
        '</div>' +
        '<div class="check-circle">' + (choreState[i] ? '✓' : '') + '</div>';

      // Touch-friendly tap handler for each card
      (function(index, cardEl) {
        onTap(cardEl, function() {
          if (timerRunning) return;
          toggleChore(index, cardEl);
        });
      })(i, card);

      list.appendChild(card);
    });
    updateTotal();
  }

  function toggleChore(i, card) {
    choreState[i] = !choreState[i];
    if (choreState[i]) spawnConfetti(card);
    timerUsed = false;
    render();
  }

  function updateTotal() {
    var total = getEarnedMinutes();
    totalEl.textContent = total + ' min';
    var allDone = choreState.every(Boolean);
    allDoneEl.classList.toggle('show', allDone);
    updateTimerUI();
  }

  function spawnConfetti(card) {
    var rect = card.getBoundingClientRect();
    var cx = rect.right - 30;
    var cy = rect.top + rect.height / 2;
    var colors = ['#FFD93D','#FF6B8A','#6EC6FF','#4ECB71','#B06CFF','#FF9F43'];
    for (var j = 0; j < 8; j++) {
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = (cx + Math.random() * 40 - 20) + 'px';
      piece.style.top = cy + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      document.body.appendChild(piece);
      setTimeout(function(p) { p.remove(); }, 1400, piece);
    }
  }

  function bigConfetti() {
    var colors = ['#FFD93D','#FF6B8A','#6EC6FF','#4ECB71','#B06CFF','#FF9F43'];
    for (var j = 0; j < 40; j++) {
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = (Math.random() * window.innerWidth) + 'px';
      piece.style.top = '-10px';
      piece.style.width = (8 + Math.random() * 8) + 'px';
      piece.style.height = (8 + Math.random() * 8) + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (1 + Math.random() * 1) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(piece);
      setTimeout(function(p) { p.remove(); }, 2500, piece);
    }
  }

  function resetAll() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    timerUsed = false;
    timerSecondsLeft = 0;
    timerTotalSeconds = 0;
    bonusMinutes = 0;
    document.getElementById('bonusCount').textContent = '0';
    document.getElementById('bonusMinus').disabled = true;
    document.getElementById('bonusPlus').disabled = false;
    choreState.fill(false);
    allDoneEl.classList.remove('show');
    render();
  }

  render();
</script>
</body>
</html>
